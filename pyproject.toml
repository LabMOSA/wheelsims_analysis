[tool.ruff]
line-length = 79
target-version = "py313"
exclude = [
	"src/nextwheel_repo/*",
	"DataDescriptions.py",
	"MoCapData.py",
	"NatNetClient.py",
]

[tool.ruff.lint]
select = ["B", "E", "W", "F", "I", "UP", "PL", "D", "NPY", "PD"]
ignore = ["D203", "D212", "D105", "D107", "PLR0913", "B028", "B904", "PLW1641"]

[tool.ruff.format]
docstring-code-format = true

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.pylint]
max-returns = 10
max-branches = 15
allow-magic-value-types = ["int", "str", "bytes"]

[tool.mypy]
exclude = [
	"src/nextwheel_repo/*",
	"DataDescriptions.py",
	"MoCapData.py",
	"NatNetClient.py",
]

[[tool.mypy.overrides]]
module = ["kineticstoolkit.*"]
follow_untyped_imports = true

[tool.coverage.run]
omit = [
	"tests/*",
	"src/nextwheel_repo/*",
	"DataDescriptions.py",
	"MoCapData.py",
	"NatNetClient.py",
]
