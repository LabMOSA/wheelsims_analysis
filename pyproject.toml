[tool.ruff]
line-length = 79
target-version = "py313"
exclude = [
	"src/nextwheel_repo/*",
	"DataDescriptions.py",
	"MoCapData.py",
	"NatNetClient.py",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "PL", "D", "NPY", "PD"]
ignore = ["D203", "D212", "D105", "D107"]

[tool.ruff.format]
docstring-code-format = true

[tool.mypy]
exclude = [
	"src/nextwheel_repo/*",
	"DataDescriptions.py",
	"MoCapData.py",
	"NatNetClient.py",
]

[[tool.mypy.overrides]]
module = ["kineticstoolkit.*"]
follow_untyped_imports = true

[tool.coverage.run]
omit = [
	"src/tests_repo/*",
	"nextwheel/*",
	"DataDescriptions.py",
	"MoCapData.py",
	"NatNetClient.py",
]
